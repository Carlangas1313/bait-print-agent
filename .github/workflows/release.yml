name: Release Windows .exe

# Trigger: cualquier tag con formato v*.*.* (ej. v0.1.0).
# El job corre en windows-latest porque Node SEA necesita el binary del
# OS target para inyectar el blob (no se puede cross-compilar desde Linux).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  # Necesario para que softprops/action-gh-release pueda crear el release.
  contents: write

jobs:
  build-windows:
    name: Build SEA executable (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag
        # Sanity check: el version del package.json debe coincidir con el tag,
        # asi no publicamos un .exe que diga "0.1.0" cuando el tag dice "v0.2.0".
        shell: pwsh
        run: |
          $pkgVersion = (Get-Content package.json | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "package.json version: $pkgVersion"
          Write-Host "tag version:          $tagVersion"
          if ($pkgVersion -ne $tagVersion) {
            Write-Error "Mismatch: package.json ($pkgVersion) != tag ($tagVersion). Actualiza package.json antes de tagear."
            exit 1
          }

      - name: Typecheck
        run: npm run typecheck

      - name: Download NSSM x64
        # NSSM (Non-Sucking Service Manager) es el wrapper estandar para
        # correr binarios Node.js como servicios Windows. El install-service
        # del agente lo usa por debajo. Lo dejamos en vendor/nssm.exe ANTES
        # de correr package:win (que lo copia a dist/).
        shell: pwsh
        run: |
          $nssmZip = "$env:RUNNER_TEMP/nssm.zip"
          Invoke-WebRequest -Uri "https://nssm.cc/release/nssm-2.24.zip" -OutFile $nssmZip
          Expand-Archive -Path $nssmZip -DestinationPath "$env:RUNNER_TEMP/nssm" -Force
          New-Item -ItemType Directory -Path "vendor" -Force | Out-Null
          Copy-Item "$env:RUNNER_TEMP/nssm/nssm-2.24/win64/nssm.exe" "vendor/nssm.exe" -Force
          $sizeKB = ((Get-Item vendor/nssm.exe).Length / 1KB).ToString('F1')
          Write-Host "NSSM x64 listo en vendor/nssm.exe ($sizeKB KB)"

      - name: Package for Windows
        run: npm run package:win

      - name: Verify .exe runs
        # Smoke test minimo: el .exe debe poder imprimir su version sin crashear.
        shell: pwsh
        run: |
          $exe = "dist/bait-print-agent-win-x64.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "No existe $exe"
            exit 1
          }
          $output = & $exe --version
          Write-Host "Output de --version: $output"
          if ($output -notmatch "0\.1\.0|${{ github.ref_name }}".TrimStart('v')) {
            Write-Warning "El output de --version no matchea el tag, pero seguimos."
          }

      - name: Compute version (strip v prefix)
        id: version
        shell: pwsh
        # github.ref_name viene como "v0.3.0"; Inno Setup recibe "0.3.0".
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "version: $v"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer with Inno Setup
        # Inno Setup 6.x viene pre-instalado en windows-latest runners desde 2023.
        # /Q = quiet (sin output del compiler), /D para pasar variables al .iss.
        # Output cae en dist\Output\bait-print-agent-setup-X.Y.Z.exe (configurado
        # con OutputDir + OutputBaseFilename en el .iss).
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup no esta preinstalado, instalando con choco..."
            choco install innosetup -y --no-progress
          }
          & $iscc /Q /DVersion=${{ steps.version.outputs.version }} scripts\bait-print-agent.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC fallo con exit code $LASTEXITCODE"
            exit 1
          }

      - name: Copy installer to non-versioned filename for /latest/ URL
        # GitHub Releases /releases/latest/download/<file> requiere un nombre
        # fijo. Copiamos el versionado a un alias sin version para que el modal
        # de bait-pos pueda apuntar a un URL estable.
        shell: pwsh
        run: |
          $versioned = "dist\Output\bait-print-agent-setup-${{ steps.version.outputs.version }}.exe"
          $alias = "dist\Output\bait-print-agent-setup.exe"
          if (-not (Test-Path $versioned)) {
            Write-Error "No existe $versioned — el Inno Setup no genero el output esperado."
            exit 1
          }
          Copy-Item -Path $versioned -Destination $alias -Force
          Write-Host "Copy OK: $alias"

      - name: List release artifacts
        shell: cmd
        run: dir dist\ /B & dir dist\Output\ /B

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/bait-print-agent-win-x64.exe -Algorithm SHA256).Hash
          Write-Host "SHA256: $hash"
          $hash | Out-File -FilePath dist/bait-print-agent-win-x64.exe.sha256 -Encoding ascii

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/Output/bait-print-agent-setup-${{ steps.version.outputs.version }}.exe
            dist/Output/bait-print-agent-setup.exe
            dist/bait-print-agent-win-x64.exe
            dist/bait-print-agent-win-x64.exe.sha256
          body: |
            ## bait-print-agent ${{ github.ref_name }}

            ### Instalador con UI (recomendado)

            Doble click en `bait-print-agent-setup.exe` → wizard en espanol →
            pega el codigo de 8 caracteres que te dio bait-app.cl. El instalador
            registra el agente como servicio Windows y lo arranca automaticamente.

            ### Binario pelado (avanzado / scripted)

            Si necesitas integrar el agente en un script o lo queres correr sin
            el wizard, descarga `bait-print-agent-win-x64.exe` y segui las
            instrucciones del [README](https://github.com/Carlangas1313/bait-print-agent#opci%C3%B3n-b-binario-pelado-avanzado--scripted).

            ### Windows SmartScreen

            El .exe todavia no esta firmado (Sprint 3c). SmartScreen te va a
            mostrar "Windows protegio tu PC" la primera vez:
            - Click en **Mas informacion** -> **Ejecutar de todos modos**.

            ### Verificar integridad

            ```
            certutil -hashfile bait-print-agent-win-x64.exe SHA256
            ```

            Compara con el contenido de `bait-print-agent-win-x64.exe.sha256`.
