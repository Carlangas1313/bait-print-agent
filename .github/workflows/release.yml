name: Release Windows .exe

# Trigger: cualquier tag con formato v*.*.* (ej. v0.1.0).
# El job corre en windows-latest porque Node SEA necesita el binary del
# OS target para inyectar el blob (no se puede cross-compilar desde Linux).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  # Necesario para que softprops/action-gh-release pueda crear el release.
  contents: write

jobs:
  build-windows:
    name: Build SEA executable (windows-latest)
    runs-on: windows-latest
    # Cold cargo cache compila tauri+wry+tao y ~400 crates desde 0 (~8-10 min).
    # Cache hit baja a ~2 min. Sumamos margen para el Node SEA packaging + Inno
    # Setup + smoke tests. 30 min es comodo para el peor caso (1ra release con
    # bump de tauri o cambio de Cargo.lock).
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        # Node 22 trae WebSocket nativo (no como Node 20). Lo necesita
        # @supabase/supabase-js para el Realtime client que el agente usa
        # para escuchar print_jobs. Sin Node 22, el client tira "Node.js 20
        # detected without native WebSocket support" apenas se crea.
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust toolchain
        # Necesario para compilar el companion (Tauri 2 = Rust crate). Usamos
        # stable porque Tauri 2 no requiere nightly y queremos reproducibilidad
        # del build (la imagen de windows-latest puede traer otra version de
        # rustc preinstalada que cambia entre runs).
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + companion target
        # Sin cache, la 1ra compilacion del companion tarda ~7-10 min en CI
        # (compila tauri + wry + tao + 400+ crates desde cero). Con cache hit,
        # baja a ~1-2 min. La key incluye Cargo.lock para invalidar cuando se
        # actualizan deps; el working-directory apunta a src-tauri/ para que
        # Swatinem/rust-cache encuentre Cargo.toml + target/ del companion.
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion/src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify package version matches tag (agente + companion)
        # Sanity check: TODOS los manifests de version deben coincidir con el
        # tag. El agente Node.js tiene package.json; el companion Tauri tiene
        # SU package.json y SU tauri.conf.json, ambos deben matchear.
        #
        # Bug que fix (2026-05-21): liberamos v0.8.0 con el companion bumpeado
        # solo a 0.7.2 (el bump del agente no toco companion/). El companion
        # detectaba 0.7.2 != 0.8.0 release y ofrecia update infinitamente
        # porque al instalar 0.8.0 el .exe del companion seguia siendo 0.7.2.
        # Loop de update sin progreso. Este guard previene que vuelva a pasar.
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "tag version:                          $tagVersion"

          $agentVersion = (Get-Content package.json | ConvertFrom-Json).version
          Write-Host "agente package.json:                  $agentVersion"

          $companionPkgVersion = (Get-Content companion/package.json | ConvertFrom-Json).version
          Write-Host "companion package.json:               $companionPkgVersion"

          $companionTauriVersion = (Get-Content companion/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          Write-Host "companion src-tauri/tauri.conf.json:  $companionTauriVersion"

          $mismatches = @()
          if ($agentVersion -ne $tagVersion) {
            $mismatches += "agent package.json ($agentVersion)"
          }
          if ($companionPkgVersion -ne $tagVersion) {
            $mismatches += "companion package.json ($companionPkgVersion)"
          }
          if ($companionTauriVersion -ne $tagVersion) {
            $mismatches += "companion tauri.conf.json ($companionTauriVersion)"
          }

          if ($mismatches.Count -gt 0) {
            Write-Error ("Version mismatch contra tag {0}: {1}. Bumpear los 4 lugares (package.json + src/constants.ts + companion/package.json + companion/src-tauri/tauri.conf.json) antes de tagear." -f $tagVersion, ($mismatches -join ', '))
            exit 1
          }
          Write-Host "OK: agent + companion (package.json + tauri.conf.json) todos en $tagVersion"

      - name: Typecheck
        run: npm run typecheck

      - name: Verify NSSM is vendored
        # NSSM (Non-Sucking Service Manager) viene commiteado en vendor/nssm.exe
        # del repo. Es ~325 KB, public domain, sin updates desde 2014. Lo
        # commiteamos en lugar de descargarlo del CI para no depender de la
        # disponibilidad de nssm.cc (que se cayo en el primer intento de
        # release v0.5.1 con HTTP 503).
        shell: pwsh
        run: |
          if (-not (Test-Path vendor/nssm.exe)) {
            Write-Error "vendor/nssm.exe no esta en el repo. Verifica que este commiteado."
            exit 1
          }
          $sizeKB = ((Get-Item vendor/nssm.exe).Length / 1KB).ToString('F1')
          Write-Host "NSSM x64 vendored OK ($sizeKB KB)"

      - name: Install companion deps
        # El companion (Tauri 2 + Vite + React) vive en companion/ y tiene su
        # propio package.json — npm ci ahi para no contaminar las deps del
        # agente. Setup-node v4 ya tiene el cache npm prendido para la lockfile
        # del root; companion/package-lock.json se cachea aparte la 1ra vez.
        working-directory: companion
        run: npm ci

      - name: Build companion (Tauri release)
        # --no-bundle: queremos solo el .exe pelado en target/release/, NO el
        # MSI/NSIS de Tauri. Inno Setup empaqueta el .exe del companion junto
        # con el agente en bait-print-agent-setup.exe (un solo instalador).
        # Como defensa adicional, tauri.conf.json tiene bundle.active=false +
        # bundle.targets=[] por si el flag --no-bundle desaparece en una
        # version futura de Tauri CLI.
        working-directory: companion
        run: npm run tauri:build -- --no-bundle

      - name: Verify companion.exe
        # Sanity check: el .exe del companion debe quedar en target/release/.
        # Si Tauri cambia el output path en una version futura, lo agarramos
        # aca antes de seguir al Inno Setup (que falla con "file not found"
        # con un error menos util).
        shell: pwsh
        run: |
          $exe = "companion/src-tauri/target/release/bait-print-companion.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "No existe $exe — el build del companion no genero el .exe esperado."
            exit 1
          }
          $sizeMB = ((Get-Item $exe).Length / 1MB).ToString('F1')
          Write-Host "Companion .exe OK ($sizeMB MB)"

      - name: Package for Windows
        run: npm run package:win

      - name: Verify .exe runs
        # Smoke test minimo: el .exe debe poder imprimir su version sin crashear.
        shell: pwsh
        run: |
          $exe = "dist/bait-print-agent-win-x64.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "No existe $exe"
            exit 1
          }
          $output = & $exe --version
          Write-Host "Output de --version: $output"
          $expected = "${{ github.ref_name }}".TrimStart('v')
          if ($output -notmatch [regex]::Escape($expected)) {
            Write-Warning "El output de --version no matchea el tag ($expected), pero seguimos."
          }

      - name: Compute version (strip v prefix)
        id: version
        shell: pwsh
        # github.ref_name viene como "v0.3.0"; Inno Setup recibe "0.3.0".
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          Write-Host "version: $v"
          echo "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build installer with Inno Setup
        # Inno Setup 6.x viene pre-instalado en windows-latest runners desde 2023.
        # /Q = quiet (sin output del compiler), /D para pasar variables al .iss.
        # Output cae en dist\Output\bait-print-agent-setup-X.Y.Z.exe (configurado
        # con OutputDir + OutputBaseFilename en el .iss).
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup no esta preinstalado, instalando con choco..."
            choco install innosetup -y --no-progress
          }
          & $iscc /Q /DVersion=${{ steps.version.outputs.version }} scripts\bait-print-agent.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC fallo con exit code $LASTEXITCODE"
            exit 1
          }

      - name: Copy installer to non-versioned filename for /latest/ URL
        # GitHub Releases /releases/latest/download/<file> requiere un nombre
        # fijo. Copiamos el versionado a un alias sin version para que el modal
        # de bait-pos pueda apuntar a un URL estable.
        shell: pwsh
        run: |
          $versioned = "dist\Output\bait-print-agent-setup-${{ steps.version.outputs.version }}.exe"
          $alias = "dist\Output\bait-print-agent-setup.exe"
          if (-not (Test-Path $versioned)) {
            Write-Error "No existe $versioned — el Inno Setup no genero el output esperado."
            exit 1
          }
          Copy-Item -Path $versioned -Destination $alias -Force
          Write-Host "Copy OK: $alias"

      - name: List release artifacts
        shell: cmd
        run: dir dist\ /B & dir dist\Output\ /B

      - name: Compute SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist/bait-print-agent-win-x64.exe -Algorithm SHA256).Hash
          Write-Host "SHA256: $hash"
          $hash | Out-File -FilePath dist/bait-print-agent-win-x64.exe.sha256 -Encoding ascii

      - name: Stage companion .exe for release asset
        # Copiamos el .exe del companion a dist/ con un nombre versionado para
        # que aparezca en el release de GitHub. Asi un cliente que ya tiene el
        # servicio instalado puede bajar solo el companion si lo desinstalo
        # o quiere reinstalarlo, sin re-correr el wizard completo.
        shell: pwsh
        run: |
          $src = "companion/src-tauri/target/release/bait-print-companion.exe"
          $dst = "dist/bait-print-companion-win-x64.exe"
          Copy-Item -Path $src -Destination $dst -Force
          Write-Host "Companion copiado a $dst"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            dist/Output/bait-print-agent-setup-${{ steps.version.outputs.version }}.exe
            dist/Output/bait-print-agent-setup.exe
            dist/bait-print-agent-win-x64.exe
            dist/bait-print-agent-win-x64.exe.sha256
            dist/bait-print-companion-win-x64.exe
          body: |
            ## bait-print-agent ${{ github.ref_name }}

            ### Instalador con UI (recomendado)

            Doble click en `bait-print-agent-setup.exe` → wizard en espanol →
            pega el codigo de 8 caracteres que te dio bait-app.cl. El instalador
            registra el agente como servicio Windows y lo arranca automaticamente.

            ### Binario pelado (avanzado / scripted)

            Si necesitas integrar el agente en un script o lo queres correr sin
            el wizard, descarga `bait-print-agent-win-x64.exe` y segui las
            instrucciones del [README](https://github.com/Carlangas1313/bait-print-agent#opci%C3%B3n-b-binario-pelado-avanzado--scripted).

            ### Windows SmartScreen

            El .exe todavia no esta firmado (Sprint 3c). SmartScreen te va a
            mostrar "Windows protegio tu PC" la primera vez:
            - Click en **Mas informacion** -> **Ejecutar de todos modos**.

            ### Verificar integridad

            ```
            certutil -hashfile bait-print-agent-win-x64.exe SHA256
            ```

            Compara con el contenido de `bait-print-agent-win-x64.exe.sha256`.
